# .github/workflows/daily_report.yml
# 美股量化日报(选股 + 成交榜监控)· 每日收盘后自动推送
# 美股 16:00 ET 收盘 = 20:00 UTC(夏令时)/ 21:00 UTC(冬令时)
# 定时 22:00 UTC(北京时间早6点)全年覆盖收盘,给 yfinance 数据落地留缓冲
name: us-daily-report

on:
  schedule:
    - cron: "0 22 * * 1-5"   # 周一至周五 22:00 UTC
  workflow_dispatch:          # 支持手动触发

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install yfinance pandas numpy lxml requests

      - name: Run daily report & push
        env:
          SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
          DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        run: python daily_report.py --push
